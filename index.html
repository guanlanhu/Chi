<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Chi — Meal Journal</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #f7f5f0;
    color: #1a1814;
    max-width: 700px;
    margin: 0 auto;
    padding: 24px;
  }

  h1 { color: #c8602a; margin-bottom: 4px; }
  .sub { color: #777; margin-top: 0; }

  .card {
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 20px;
  }

  label {
    display: block;
    font-size: 14px;
    margin: 12px 0 6px;
    color: #666;
  }

  input, textarea, button {
    font: inherit;
  }

  input[type="text"], textarea {
    width: 100%;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 8px;
  }

  textarea {
    min-height: 90px;
    resize: vertical;
  }

  input[type="file"] {
    margin-top: 8px;
  }

  .row {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .row input[type="text"] {
    flex: 1;
  }

  button {
    background: #c8602a;
    color: white;
    border: none;
    padding: 10px 14px;
    border-radius: 8px;
    cursor: pointer;
  }

  button.secondary {
    background: #eee;
    color: #333;
  }

  img.preview {
    width: 100%;
    max-height: 220px;
    object-fit: cover;
    border-radius: 10px;
    margin-top: 12px;
  }

  .meal {
    border: 1px solid #ddd;
    border-radius: 12px;
    background: #fff;
    overflow: hidden;
    margin-bottom: 14px;
  }

  .meal img {
    width: 100%;
    height: 200px;
    object-fit: cover;
    display: block;
  }

  .meal-body {
    padding: 14px;
  }

  .meal-top {
    display: flex;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 8px;
  }

  .muted {
    color: #777;
    font-size: 14px;
  }

  .empty {
    color: #777;
    text-align: center;
    padding: 24px;
  }
</style>
</head>
<body>
  <h1>Chi</h1>
  <p class="sub">your meal journal</p>

  <div class="card">
    <label>Photo</label>
    <input type="file" id="photo" accept="image/*" />
    <img id="preview" class="preview" style="display:none" alt="Preview" />

    <label>Meal name</label>
    <input type="text" id="mealName" placeholder="e.g. Chicken salad" />

    <label>Description</label>
    <textarea id="description" placeholder="Add a short description"></textarea>

    <label>UPC barcode</label>
    <div class="row">
      <input type="text" id="barcode" placeholder="Scan or type barcode" />
      <button type="button" class="secondary" id="scanBtn">Scan</button>
    </div>

    <div style="margin-top:14px;">
      <button type="button" id="saveBtn">Save meal</button>
    </div>
  </div>

  <h2>Your meals</h2>
  <div id="mealList"></div>

<script>
  let meals = JSON.parse(localStorage.getItem('chi-meals') || '[]');
  let imageData = '';

  const photo = document.getElementById('photo');
  const preview = document.getElementById('preview');
  const mealName = document.getElementById('mealName');
  const description = document.getElementById('description');
  const barcode = document.getElementById('barcode');
  const mealList = document.getElementById('mealList');

  photo.addEventListener('change', () => {
    const file = photo.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = e => {
      imageData = e.target.result;
      preview.src = imageData;
      preview.style.display = 'block';
    };
    reader.readAsDataURL(file);
  });

  document.getElementById('scanBtn').addEventListener('click', async () => {
    if ('BarcodeDetector' in window) {
      alert('Barcode scan can be connected here later. For now, type the UPC code manually.');
    } else {
      alert('Barcode scanning is not supported here. Please type the UPC code.');
    }
  });

  document.getElementById('saveBtn').addEventListener('click', () => {
    const meal = {
      id: Date.now(),
      name: mealName.value.trim() || 'Untitled meal',
      description: description.value.trim(),
      barcode: barcode.value.trim(),
      image: imageData,
      date: new Date().toLocaleString()
    };

    meals.unshift(meal);
    localStorage.setItem('chi-meals', JSON.stringify(meals));
    resetForm();
    renderMeals();
  });

  function resetForm() {
    photo.value = '';
    mealName.value = '';
    description.value = '';
    barcode.value = '';
    imageData = '';
    preview.src = '';
    preview.style.display = 'none';
  }

  function deleteMeal(id) {
    meals = meals.filter(meal => meal.id !== id);
    localStorage.setItem('chi-meals', JSON.stringify(meals));
    renderMeals();
  }

  function renderMeals() {
    if (!meals.length) {
      mealList.innerHTML = '<div class="empty">No meals yet.</div>';
      return;
    }

    mealList.innerHTML = meals.map(meal => `
      <div class="meal">
        ${meal.image ? `<img src="${meal.image}" alt="${meal.name}">` : ''}
        <div class="meal-body">
          <div class="meal-top">
            <strong>${meal.name}</strong>
            <span class="muted">${meal.date}</span>
          </div>
          ${meal.description ? `<p>${meal.description}</p>` : ''}
          ${meal.barcode ? `<p class="muted">UPC: ${meal.barcode}</p>` : ''}
          <button class="secondary" onclick="deleteMeal(${meal.id})">Delete</button>
        </div>
      </div>
    `).join('');
  }

  renderMeals();
</script>
</body>
</html>
