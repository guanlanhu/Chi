<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chi — Meal Journal</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Serif+Display&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f7f5f0;
    --surface: #ffffff;
    --border: #e5e0d8;
    --text: #1a1814;
    --muted: #8a8680;
    --accent: #c8602a;
    --accent-light: #fdf0e8;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  header {
    padding: 2rem 2rem 1rem;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    align-items: baseline;
    gap: 1rem;
  }

  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 2rem;
    font-weight: 400;
    color: var(--accent);
  }

  header span {
    font-size: 0.85rem;
    color: var(--muted);
  }

  .container {
    max-width: 680px;
    margin: 0 auto;
    padding: 2rem 1.5rem;
  }

  /* Upload card */
  .upload-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.5rem;
    margin-bottom: 2rem;
  }

  .upload-card h2 {
    font-size: 1rem;
    font-weight: 500;
    margin-bottom: 1.25rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-size: 0.75rem;
  }

  .drop-zone {
    border: 1.5px dashed var(--border);
    border-radius: 12px;
    padding: 2.5rem 1rem;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--bg);
    position: relative;
    margin-bottom: 1rem;
  }

  .drop-zone:hover, .drop-zone.drag-over {
    border-color: var(--accent);
    background: var(--accent-light);
  }

  .drop-zone input[type=file] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }

  .drop-zone .icon {
    font-size: 2rem;
    margin-bottom: 0.5rem;
    display: block;
  }

  .drop-zone p {
    font-size: 0.9rem;
    color: var(--muted);
  }

  .drop-zone strong {
    color: var(--accent);
    font-weight: 500;
  }

  #preview-wrap {
    display: none;
    margin-bottom: 1rem;
    position: relative;
  }

  #preview-wrap img {
    width: 100%;
    max-height: 300px;
    object-fit: cover;
    border-radius: 10px;
    display: block;
  }

  #remove-img {
    position: absolute;
    top: 8px;
    right: 8px;
    background: rgba(0,0,0,0.55);
    color: white;
    border: none;
    border-radius: 50%;
    width: 28px;
    height: 28px;
    cursor: pointer;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .fields {
    display: grid;
    gap: 0.75rem;
  }

  .field-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.75rem;
  }

  .field label {
    display: block;
    font-size: 0.75rem;
    color: var(--muted);
    margin-bottom: 4px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .field input, .field textarea, .field select {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    background: var(--bg);
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }

  .field input:focus, .field textarea:focus {
    border-color: var(--accent);
  }

  .field textarea {
    min-height: 80px;
    resize: vertical;
  }

  .macro-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0.5rem;
  }

  .macro-row .field label {
    font-size: 0.7rem;
  }

  .submit-btn {
    width: 100%;
    padding: 13px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    font-weight: 500;
    cursor: pointer;
    margin-top: 1rem;
    transition: opacity 0.15s, transform 0.1s;
  }

  .submit-btn:hover { opacity: 0.9; }
  .submit-btn:active { transform: scale(0.99); }

  /* Feed */
  .feed-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.25rem;
  }

  .feed-header h2 {
    font-family: 'DM Serif Display', serif;
    font-size: 1.4rem;
    font-weight: 400;
  }

  .meal-count {
    font-size: 0.8rem;
    color: var(--muted);
    background: var(--border);
    padding: 3px 10px;
    border-radius: 99px;
  }

  .feed {
    display: grid;
    gap: 1rem;
  }

  .meal-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    display: flex;
    gap: 0;
    flex-direction: column;
    animation: fadeUp 0.3s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .meal-card img {
    width: 100%;
    height: 200px;
    object-fit: cover;
    display: block;
  }

  .meal-card .no-photo {
    width: 100%;
    height: 100px;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2rem;
    color: var(--border);
  }

  .meal-body {
    padding: 1rem 1.25rem;
  }

  .meal-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 0.5rem;
  }

  .meal-title {
    font-weight: 500;
    font-size: 1rem;
  }

  .meal-time {
    font-size: 0.75rem;
    color: var(--muted);
  }

  .meal-notes {
    font-size: 0.88rem;
    color: var(--muted);
    line-height: 1.6;
    margin-bottom: 0.75rem;
  }

  .macros {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
  }

  .macro-tag {
    font-size: 0.75rem;
    padding: 3px 10px;
    border-radius: 99px;
    font-weight: 500;
  }

  .tag-cal  { background: #fef3c7; color: #92400e; }
  .tag-pro  { background: #d1fae5; color: #065f46; }
  .tag-carb { background: #e0f2fe; color: #0c4a6e; }
  .tag-fat  { background: #fce7f3; color: #831843; }

  .meal-actions {
    display: flex;
    gap: 0.5rem;
    margin-top: 0.75rem;
    padding-top: 0.75rem;
    border-top: 1px solid var(--border);
  }

  .meal-actions button {
    font-size: 0.78rem;
    padding: 5px 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: none;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    color: var(--muted);
    transition: all 0.15s;
  }

  .meal-actions button:hover { border-color: var(--accent); color: var(--accent); }
  .meal-actions .delete-btn:hover { border-color: #dc2626; color: #dc2626; }

  .empty-state {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--muted);
  }

  .empty-state .big-icon { font-size: 3rem; margin-bottom: 1rem; }
  .empty-state p { font-size: 0.9rem; line-height: 1.6; }

  .toast {
    position: fixed;
    bottom: 1.5rem;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--text);
    color: white;
    padding: 10px 20px;
    border-radius: 99px;
    font-size: 0.875rem;
    transition: transform 0.3s;
    z-index: 100;
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header>
  <h1>Chi</h1>
  <span>your meal journal</span>
</header>

<div class="container">

  <!-- Log form -->
  <div class="upload-card">
    <h2>Log a meal</h2>

    <div class="drop-zone" id="drop-zone">
      <input type="file" id="file-input" accept="image/*">
      <span class="icon">📷</span>
      <p><strong>Click to upload</strong> or drag a photo here</p>
    </div>

    <div id="preview-wrap">
      <img id="preview-img" alt="meal photo">
      <button id="remove-img" title="Remove photo">✕</button>
    </div>

    <div class="fields">
      <div class="field">
        <label>Meal name</label>
        <input type="text" id="meal-name" placeholder="e.g. Grilled salmon with rice">
      </div>

      <div class="field">
        <label>Notes</label>
        <textarea id="meal-notes" placeholder="How did it taste? Any ingredients to remember?"></textarea>
      </div>

      <div>
        <label style="display:block; font-size:0.75rem; color:var(--muted); margin-bottom:6px; text-transform:uppercase; letter-spacing:0.04em;">Macros (optional)</label>
        <div class="macro-row">
          <div class="field">
            <label>Calories</label>
            <input type="number" id="cal" placeholder="kcal">
          </div>
          <div class="field">
            <label>Protein</label>
            <input type="number" id="protein" placeholder="g">
          </div>
          <div class="field">
            <label>Carbs</label>
            <input type="number" id="carbs" placeholder="g">
          </div>
          <div class="field">
            <label>Fat</label>
            <input type="number" id="fat" placeholder="g">
          </div>
        </div>
      </div>
    </div>

    <button class="submit-btn" onclick="logMeal()">Save meal →</button>
  </div>

  <!-- Feed -->
  <div class="feed-header">
    <h2>Your meals</h2>
    <span class="meal-count" id="meal-count">0 logged</span>
  </div>

  <div class="feed" id="feed">
    <div class="empty-state">
      <div class="big-icon">🍽️</div>
      <p>No meals logged yet.<br>Upload a photo and add your first entry above.</p>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
  let meals = JSON.parse(localStorage.getItem('chi-meals') || '[]');
  let currentImageData = null;

  const fileInput = document.getElementById('file-input');
  const dropZone = document.getElementById('drop-zone');
  const previewWrap = document.getElementById('preview-wrap');
  const previewImg = document.getElementById('preview-img');

  fileInput.addEventListener('change', e => {
    const file = e.target.files[0];
    if (file) loadImage(file);
  });

  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) loadImage(file);
  });

  document.getElementById('remove-img').addEventListener('click', () => {
    currentImageData = null;
    previewWrap.style.display = 'none';
    dropZone.style.display = 'block';
    fileInput.value = '';
  });

  function loadImage(file) {
    const reader = new FileReader();
    reader.onload = ev => {
      currentImageData = ev.target.result;
      previewImg.src = currentImageData;
      previewWrap.style.display = 'block';
      dropZone.style.display = 'none';
    };
    reader.readAsDataURL(file);
  }

  function logMeal() {
    const name = document.getElementById('meal-name').value.trim();
    if (!name && !currentImageData) {
      showToast('Please add a photo or meal name');
      return;
    }

    const meal = {
      id: Date.now(),
      name: name || 'Untitled meal',
      notes: document.getElementById('meal-notes').value.trim(),
      calories: document.getElementById('cal').value,
      protein: document.getElementById('protein').value,
      carbs: document.getElementById('carbs').value,
      fat: document.getElementById('fat').value,
      image: currentImageData,
      date: new Date().toISOString()
    };

    meals.unshift(meal);
    saveMeals();
    renderFeed();
    resetForm();
    showToast('Meal saved! 🎉');
  }

  function deleteMeal(id) {
    meals = meals.filter(m => m.id !== id);
    saveMeals();
    renderFeed();
    showToast('Meal deleted');
  }

  function saveMeals() {
    localStorage.setItem('chi-meals', JSON.stringify(meals));
  }

  function resetForm() {
    document.getElementById('meal-name').value = '';
    document.getElementById('meal-notes').value = '';
    document.getElementById('cal').value = '';
    document.getElementById('protein').value = '';
    document.getElementById('carbs').value = '';
    document.getElementById('fat').value = '';
    currentImageData = null;
    previewWrap.style.display = 'none';
    dropZone.style.display = 'block';
    document.getElementById('file-input').value = '';
  }

  function formatDate(iso) {
    const d = new Date(iso);
    return d.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
  }

  function renderFeed() {
    const feed = document.getElementById('feed');
    document.getElementById('meal-count').textContent = meals.length + ' logged';

    if (meals.length === 0) {
      feed.innerHTML = `<div class="empty-state"><div class="big-icon">🍽️</div><p>No meals logged yet.<br>Upload a photo and add your first entry above.</p></div>`;
      return;
    }

    feed.innerHTML = meals.map(m => `
      <div class="meal-card">
        ${m.image
          ? `<img src="${m.image}" alt="${m.name}">`
          : `<div class="no-photo">🍴</div>`}
        <div class="meal-body">
          <div class="meal-meta">
            <span class="meal-title">${m.name}</span>
            <span class="meal-time">${formatDate(m.date)}</span>
          </div>
          ${m.notes ? `<p class="meal-notes">${m.notes}</p>` : ''}
          <div class="macros">
            ${m.calories ? `<span class="macro-tag tag-cal">🔥 ${m.calories} kcal</span>` : ''}
            ${m.protein  ? `<span class="macro-tag tag-pro">💪 ${m.protein}g protein</span>` : ''}
            ${m.carbs    ? `<span class="macro-tag tag-carb">🌾 ${m.carbs}g carbs</span>` : ''}
            ${m.fat      ? `<span class="macro-tag tag-fat">🫙 ${m.fat}g fat</span>` : ''}
          </div>
          <div class="meal-actions">
            <button class="delete-btn" onclick="deleteMeal(${m.id})">Delete</button>
          </div>
        </div>
      </div>
    `).join('');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  renderFeed();
</script>
</body>
</html>
